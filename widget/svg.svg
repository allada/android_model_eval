<svg width="100%" viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Agent surface dashed container -->
<rect x="182" y="24" width="330" height="150" rx="14" fill="none" stroke="#999" stroke-width="0.5" stroke-dasharray="6 4"/>
<text x="196" y="44" fill="#666" font-size="12">Agent surface</text>

<!-- Admin surface dashed container -->
<rect x="182" y="200" width="330" height="138" rx="14" fill="none" stroke="#999" stroke-width="0.5" stroke-dasharray="6 4"/>
<text x="196" y="220" fill="#666" font-size="12">Admin surface</text>

<!-- Test Harness -->
<g>
  <rect x="35" y="50" width="118" height="280" rx="8" fill="rgb(68, 68, 65)" stroke="rgb(180, 178, 169)" stroke-width="0.5"/>
  <text x="94" y="78" text-anchor="middle" dominant-baseline="central" fill="#e8e6df" font-size="14" font-weight="500">Test harness</text>
  <text x="94" y="98" text-anchor="middle" dominant-baseline="central" fill="#b4b2a9" font-size="12">Orchestrates</text>
  <text x="94" y="114" text-anchor="middle" dominant-baseline="central" fill="#b4b2a9" font-size="12">everything</text>
</g>

<!-- LLM -->
<g>
  <rect x="200" y="60" width="110" height="48" rx="8" fill="rgb(60, 52, 137)" stroke="rgb(175, 169, 236)" stroke-width="0.5"/>
  <text x="255" y="84" text-anchor="middle" dominant-baseline="central" fill="rgb(206, 203, 246)" font-size="14" font-weight="500">LLM</text>
</g>

<!-- MCP Bridge -->
<g>
  <rect x="340" y="44" width="156" height="120" rx="8" fill="rgb(8, 80, 65)" stroke="rgb(93, 202, 165)" stroke-width="0.5"/>
  <text x="418" y="68" text-anchor="middle" dominant-baseline="central" fill="rgb(159, 225, 203)" font-size="14" font-weight="500">MCP bridge</text>
  <line x1="352" y1="80" x2="484" y2="80" stroke="rgb(93, 202, 165)" stroke-width="0.5" opacity="0.3"/>
  <text x="418" y="98" text-anchor="middle" dominant-baseline="central" fill="rgb(93, 202, 165)" font-size="12">screenshot, tap</text>
  <text x="418" y="116" text-anchor="middle" dominant-baseline="central" fill="rgb(93, 202, 165)" font-size="12">swipe, long-press</text>
  <text x="418" y="134" text-anchor="middle" dominant-baseline="central" fill="rgb(93, 202, 165)" font-size="12">key event, sleep</text>
</g>

<!-- Admin API -->
<g>
  <rect x="240" y="232" width="170" height="96" rx="8" fill="rgb(99, 56, 6)" stroke="rgb(239, 159, 39)" stroke-width="0.5"/>
  <text x="325" y="256" text-anchor="middle" dominant-baseline="central" fill="rgb(250, 199, 117)" font-size="14" font-weight="500">Admin API</text>
  <line x1="252" y1="268" x2="398" y2="268" stroke="rgb(239, 159, 39)" stroke-width="0.5" opacity="0.3"/>
  <text x="325" y="286" text-anchor="middle" dominant-baseline="central" fill="rgb(239, 159, 39)" font-size="12">snapshots, ADB shell</text>
  <text x="325" y="304" text-anchor="middle" dominant-baseline="central" fill="rgb(239, 159, 39)" font-size="12">recording, verification</text>
</g>

<!-- Android Emulator -->
<g>
  <rect x="530" y="50" width="120" height="280" rx="8" fill="rgb(113, 43, 19)" stroke="rgb(240, 153, 123)" stroke-width="0.5"/>
  <text x="590" y="182" text-anchor="middle" dominant-baseline="central" fill="rgb(245, 196, 179)" font-size="14" font-weight="500">Android</text>
  <text x="590" y="200" text-anchor="middle" dominant-baseline="central" fill="rgb(245, 196, 179)" font-size="14" font-weight="500">emulator</text>
</g>

<!-- Arrow: Harness → LLM -->
<line x1="155" y1="84" x2="198" y2="84" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<text x="176" y="74" text-anchor="middle" fill="#666" font-size="12">invokes</text>

<!-- Arrow: LLM ↔ MCP Bridge -->
<line x1="312" y1="78" x2="338" y2="78" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="338" y1="92" x2="312" y2="92" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Arrow: MCP Bridge ↔ Emulator -->
<line x1="498" y1="104" x2="528" y2="104" stroke="#1D9E75" stroke-width="1" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
<text x="513" y="94" text-anchor="middle" fill="#666" font-size="12">ADB</text>

<!-- Arrow: Harness → Admin API -->
<line x1="155" y1="280" x2="238" y2="280" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<text x="196" y="270" text-anchor="middle" fill="#666" font-size="12">controls</text>

<!-- Arrow: Admin API ↔ Emulator -->
<line x1="412" y1="280" x2="528" y2="280" stroke="#D85A30" stroke-width="1" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
<text x="470" y="270" text-anchor="middle" fill="#666" font-size="12">ADB</text>

</svg>
